<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Work from Qodix</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f9f9f9; padding: 40px 0; margin: 0; color: #000;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 40px; border: 1px solid #eaeaea;">
        <div style="text-align: center; margin-bottom: 40px; border-bottom: 1px solid #000; padding-bottom: 20px;">
            <h1 style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px; margin: 0;">Qodix<span style="color: #999;">.</span></h1>
            <p style="font-size: 10px; font-family: monospace; letter-spacing: 2px; text-transform: uppercase; color: #777; margin-top: 10px;">LATEST WORK & CASE STUDIES</p>
        </div>
        
        <div style="margin-bottom: 30px;">
            <p style="font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 10px;">{{ project.category }}</p>
            <h2 style="font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-top: 0; margin-bottom: 20px;">{{ project.title }}</h2>
            <p style="font-size: 16px; color: #444; line-height: 1.6;">We've just published a new case study showcasing our recent work.</p>
            
            <div style="margin-top: 20px; padding: 15px; border-left: 4px solid #000; background-color: #fafafa;">
                <p style="margin: 0; font-size: 14px; color: #555;"><strong>Impact:</strong> {{ project.result_metric }}</p>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="https://qodix.com/work/{{ project.slug }}" style="display: inline-block; padding: 14px 28px; background-color: #000; color: #fff; text-decoration: none; font-weight: bold; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">View Case Study</a>
        </div>
        
        <div style="margin-top: 50px; border-top: 1px solid #eaeaea; padding-top: 20px; text-align: center; font-size: 12px; color: #999;">
            <p>You received this email because you are subscribed to Qodix updates.</p>
        </div>
    </div>
</body>
</html>
