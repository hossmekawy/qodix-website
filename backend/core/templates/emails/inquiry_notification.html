<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Project Inquiry</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f9f9f9; padding: 40px 0; margin: 0; color: #000;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 40px; border: 1px solid #eaeaea;">
        <div style="text-align: center; margin-bottom: 40px; border-bottom: 1px solid #000; padding-bottom: 20px;">
            <h1 style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px; margin: 0;">Qodix<span style="color: #999;">.</span></h1>
        </div>
        <div style="margin-bottom: 30px;">
            <h2 style="font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-top: 0;">New Project Inquiry</h2>
            <p style="font-size: 16px; color: #555; line-height: 1.5;">A new prospect has reached out to start a project. Below are their details:</p>
        </div>
        <div style="background-color: #fafafa; border: 1px solid #eaeaea; padding: 20px; border-radius: 4px;">
            <p style="margin: 0 0 10px 0;"><strong>Name:</strong> {{ inquiry.name }}</p>
            <p style="margin: 0 0 10px 0;"><strong>Email:</strong> <a href="mailto:{{ inquiry.email }}" style="color: #000;">{{ inquiry.email }}</a></p>
            <p style="margin: 0 0 10px 0;"><strong>Phone:</strong> {{ inquiry.phone }}</p>
            <p style="margin: 0; color: #777; font-size: 12px; margin-top: 15px;">Submitted on: {{ inquiry.submitted_at|date:"F j, Y, g:i a" }}</p>
        </div>
        <div style="margin-top: 40px; text-align: center;">
            <a href="mailto:{{ inquiry.email }}" style="display: inline-block; padding: 12px 24px; background-color: #000; color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; letter-spacing: 1px; text-transform: uppercase;">Reply to Client</a>
        </div>
    </div>
</body>
</html>
